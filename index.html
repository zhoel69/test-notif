<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Input Data + Notif Suara</title>

<style>
  body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .box {
    background: #1e293b;
    padding: 20px;
    border-radius: 12px;
    width: 300px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
  }

  input {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border-radius: 8px;
    border: none;
    outline: none;
  }

  button {
    margin-top: 15px;
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: #22c55e;
    color: black;
    font-weight: bold;
    cursor: pointer;
  }

  #toast {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #22c55e;
    color: black;
    padding: 12px 18px;
    border-radius: 10px;
    opacity: 0;
    transform: translateY(20px);
    transition: 0.3s;
  }

  #toast.show {
    opacity: 1;
    transform: translateY(0);
  }
</style>
</head>

<body>

<div class="box">
  <h3>Input Data</h3>
  <input type="text" id="nama" placeholder="Masukkan nama...">
  <button onclick="simpan()">Simpan</button>
</div>

<!-- TOAST -->
<div id="toast">Data berhasil disimpan!</div>

<!-- AUDIO -->
<audio id="notifSound" preload="auto">
  <source src="notif.mp3" type="audio/mpeg">
</audio>

<script>
  // unlock audio biar gak delay
  document.addEventListener("click", () => {
    const s = document.getElementById("notifSound");
    s.play().then(() => {
      s.pause();
      s.currentTime = 0;
    }).catch(() => {});
  }, { once: true });

  function showToast(pesan) {
    const toast = document.getElementById("toast");
    toast.innerText = pesan;
    toast.classList.add("show");

    setTimeout(() => {
      toast.classList.remove("show");
    }, 2000);
  }

  function playSound() {
    const sound = document.getElementById("notifSound");
    sound.currentTime = 0;
    sound.play().catch(() => {});
  }

  function simpan() {
    const nama = document.getElementById("nama").value;

    if (!nama) {
      showToast("Isi dulu namanya!");
      return;
    }

    // simulasi simpan
    console.log("Data:", nama);

    showToast("Tersimpan: " + nama);
    playSound(); // 🔊 langsung bunyi
  }
</script>

</body>
</html>
